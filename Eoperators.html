<!DOCTYPE html>

<body>
    <script>

        console.log("Operators in java script")

        let a = 7;
        let b = 5;

        // ARITHEMETIC OPERATOR

        console.log("a + b = ", a+b)      // adition
        console.log("a - b = ", a-b)      // substraction
        console.log("a * b = ", a*b)      // multiplication
        console.log("a / b = ", a/b)      // division
        console.log("a ** b = ", a**b)    // exponential operator (a^b)
        console.log("a % b = ", a%b)      // modulus operator (remainder)

        console.log("a++ =", a++)        // incremential operator (a++ increase the value after printing)
        console.log(a)
        console.log("b-- =", b--)         // decremential operator (a-- decrease the value after printing)
        console.log(b)

        console.log("++a =", ++a)         // fristly increase then print
        console.log("--a =", --a)         // firstly decrease then print

        // ASSIGNMENT OPERATOR

        let c = 7;            // = operator to asign value
        let d = 5;
        console.log(c)

        c += 7               // += it means c = c+5
        console.log(c)
        c -= d
        console.log(c)       // -= it means c = c-d

        c *= d
        console.log(c)

        c /= d
        console.log(c)       // /= means c = c/d

        c %= d
        console.log(c)       // %= means - remainder after c/d  (c = c % d)

        c **= d
        console.log(c)       // **= means c^d  (c = c^d)

        // COMPRESSION OPERATOR

        let e = 7;
        let f = 8;
        console.log(e==f)     // compare e and f and return true and false (compare both values)
        console.log(e!=f)

        let g = 7;
        let h = "8";
        console.log(g===h)      // compare both - values and data type (if both are same then true otherwise false)
        console.log(g!==h)

        console.log(g>h)     // compare both - is greater than or is smaller than
        console.log(g<h)

        // LOGICAL OPERATOR

        let x = 7;
        let y = 5;
        console.log(x>y && x==7)     // && - check is both conditions are true or not
        console.log(x<y && x==7)

        console.log(x>y || x==5)     // || - check if any one condition is true or not
        console.log(x<5 || x==5)

        console.log(!false)       // false to true and true to false
        console.log(!true)

        let n = prompt("what is your age ?")
        if (n>18) {
            alert("can vote !!")
        }
        else {
            alert("can't vote !!")
        }

        











        

















        





    </script>
