<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable data value types in java script</title>
</head>
<body>

    <script>

        // variables data value types in JS
        // Primitive - single value variables which are immutable
        // String , Number, Boolean, null, defined, symbol

        // string

        var myname="Anmol";
        console.log(myname);
        console.log(typeof(myname));

        // number

        var mymob=7017584032;
        console.log(myname + " mobile number is " + mymob);

        // boolean

        var ismarried=false;
        console.log(myname + " is married ? " + ismarried);

        // undefined

        var myemail;
        console.log(myemail);
        console.log(typeof(myemail));

        // null

        var myaddress=null;
        console.log(myaddress);
        console.log(typeof(myaddress));

        // bigint

        var myval=BigInt(8973646253676728876765673);
        console.log(myval);
        console.log(typeof(myval));

        // symbol

        var name1=Symbol("Anmol");
        var name2=Symbol("Anshu");
        console.log(name1==name2);

        // refrence(object)  typed == mutable in memory and keeps values in pair
        // array, object, function

        // objects are defined in pair of key and its vaule.

        let myInfo={
            name:"Anmol",
            age:18,
            ismarried:false,
            mob:7017584032,
            add:null,
            branch:"CSE",
            section:15
        };
        console.log(myInfo);
        console.log(myInfo.name);   // access object's key i.e. name

        // object length

        let keys = Object.keys(myInfo);     // to get all keys of object
        console.log("Myinfo object lenght is " + keys.length);

        // function is a block of code that perform a particilar task

        function cal() {
            var num1=45;
            var num2=40;
            var res=num1+num2;
            console.log("Addition of two numbers is " + res);
            console.log(typeof(cal));
        }
        cal();

        // array - collection of any data types in JS

        // for similar data types

        let studentlist=["Anmol", "Anshu", "Pranav", "Gajendra"];
        console.log(studentlist);
        console.log(studentlist[1]);

        // for any data type

        let anmolinfo=["Anmol Rajput", 18, false, null, "CSE", 19];
        console.log(anmolinfo);
        console.log(anmolinfo[1]);
        console.log(typeof(anmolinfo));

        // to iterate array member

        for(let i=0; i<anmolinfo.length; i++) {
            console.log(anmolinfo[i]);
        }

        
    </script>
    
</body>
</html>
