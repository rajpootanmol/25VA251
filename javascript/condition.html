<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       /* In JavaScript, conditional statements control the program flow 
        by executing specific blocks of code based on whether a condition evaluates
         to true or false. They are essential for decision-making in scripts, 
        enabling dynamic and interactive behavior. */

        // If....else statement
        let age = 28;
        if(age < 18){
            console.log("You are not eligible to vote.");
        }
        else{
        console.log(" eligible to vote");
        }

        /*The switch statement in JavaScript is used to perform different actions based on different 
        conditions. It evaluates an expression, matches the expression's value against a series of 
        case clauses, and executes statements 
         after the first case clause with a matching value until a break statement is encountered.  */

        let grade='C';
        switch(grade){
            case 'A': result="first Division";
            break;
            case 'B': result="second Division";
            break;
            case 'C': result="third Division";
            break;
            default: result="Fail";
        }
        console.log(result);

        // else if statement
        /*  In JavaScript, the else if statement is used when you want to 
        check multiple conditions in sequence.It comes after an if statement
         and before an optional else statement. */
        
         let marks = 99;
         if(marks <=33){
            console.log("Fail");
         }
         else if(marks >33 && marks <=60){
            console.log("third Division");
         }
            else if(marks >60 && marks <=80){
                console.log("second Division");
            }
            else if(marks >80 && marks <=100){
                console.log("first Division");
            }
            else{
                console.log("Invalid marks");
            }
    </script>
    
</body>
</html>
