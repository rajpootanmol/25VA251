<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // object in js : collection(pair)of key (properties ) and its value (data)
        // create an object using literal way...
        
        let student ={
            name:"anmol",
            age:18,
            isMarried:false,
            address :{
                streetNo:23,
                area:"kanth",
                city:"moradabad",
                pinCode:244501,
            },
            course:"B.tech",
            branch:"CSE",
            year:2025,
            getInfo:function(){
                return"My education detail is"+student.branch+" "+student.address+" "+student.year;
            },
            subject:["math","hindi"],


        };

        // access object's key or property
        console.log(student.address.area); //object
        console.log(student.getInfo()); //function
        console.log(student.subject[2]); //array
        console.log(typeof(student));

        //find key in your object
        console.log('name' in student);

        // delete any key from object
        console.log(delete student.name);
        console.log(student);

        // find length of object
        let keyslength=Object.keys(student);
        console.log(keyslength.length);
        
        // iterrate object's key properties
        for(let i=0; i<keyslength.length; i++){
            console.log(student[keyslength[i]]);
        }
        
    

    

    </script>
</body>
</html>
